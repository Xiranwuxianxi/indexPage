<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - 页面走丢了 | 希燃呀</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      color: #1f2937;
      background:
        radial-gradient(circle at top left, rgba(99, 102, 241, 0.22), transparent 32%),
        radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.22), transparent 35%),
        linear-gradient(135deg, #f8fafc 0%, #eef2ff 45%, #ecfeff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 24px;
    }

    .bg-text {
      position: fixed;
      font-size: 26vw;
      font-weight: 900;
      color: rgba(99, 102, 241, 0.06);
      z-index: 0;
      user-select: none;
      letter-spacing: -18px;
    }

    .container {
      position: relative;
      z-index: 1;
      width: min(920px, 100%);
      min-height: 520px;
      padding: 56px 42px;
      border-radius: 32px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.85);
      box-shadow:
        0 30px 80px rgba(59, 130, 246, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(22px);
      text-align: center;
    }

    .avatar {
      width: 92px;
      height: 92px;
      margin: 0 auto 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #06b6d4);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 36px;
      font-weight: 800;
      box-shadow: 0 18px 45px rgba(99, 102, 241, 0.35);
    }

    .code {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 999px;
      background: rgba(99, 102, 241, 0.1);
      color: #4f46e5;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 18px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6366f1;
      box-shadow: 0 0 16px #6366f1;
    }

    h1 {
      font-size: clamp(38px, 7vw, 76px);
      line-height: 1;
      letter-spacing: -3px;
      margin-bottom: 18px;
      background: linear-gradient(135deg, #111827, #4f46e5, #0891b2);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .subtitle {
      max-width: 640px;
      margin: 0 auto;
      color: #64748b;
      font-size: 18px;
      line-height: 1.9;
    }

    .subtitle strong {
      color: #334155;
    }

    .actions {
      margin-top: 38px;
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .btn {
      text-decoration: none;
      padding: 14px 24px;
      border-radius: 16px;
      font-weight: 700;
      font-size: 15px;
      transition: 0.25s ease;
    }

    .btn-primary {
      color: #fff;
      background: linear-gradient(135deg, #6366f1, #06b6d4);
      box-shadow: 0 14px 30px rgba(99, 102, 241, 0.28);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 40px rgba(99, 102, 241, 0.36);
    }

    .btn-secondary {
      color: #475569;
      background: rgba(255, 255, 255, 0.65);
      border: 1px solid rgba(148, 163, 184, 0.28);
    }

    .btn-secondary:hover {
      transform: translateY(-3px);
      background: rgba(255, 255, 255, 0.9);
    }

    .cards {
      margin-top: 42px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .card {
      padding: 20px 18px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid rgba(148, 163, 184, 0.2);
      text-align: left;
    }

    .card h2 {
      font-size: 16px;
      color: #1e293b;
      margin-bottom: 8px;
    }

    .card p {
      font-size: 13px;
      color: #64748b;
      line-height: 1.7;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(8px);
      opacity: 0.5;
      animation: float 7s ease-in-out infinite;
    }

    .orb.one {
      width: 120px;
      height: 120px;
      background: #818cf8;
      top: 10%;
      left: 8%;
    }

    .orb.two {
      width: 160px;
      height: 160px;
      background: #22d3ee;
      right: 8%;
      bottom: 10%;
      animation-delay: 1.8s;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-18px);
      }
    }

    @media (max-width: 768px) {
      .container {
        padding: 42px 24px;
        border-radius: 24px;
      }

      .cards {
        grid-template-columns: 1fr;
      }

      .subtitle {
        font-size: 16px;
      }

      .bg-text {
        font-size: 42vw;
        letter-spacing: -8px;
      }
    }
  </style>
</head>

<body>
  <div class="bg-text">404</div>
  <div class="orb one"></div>
  <div class="orb two"></div>

  <main class="container">
    <div class="avatar">希</div>

    <div class="code">
      <span class="dot"></span>
      404 Not Found
    </div>

    <h1>页面走丢了</h1>

    <p class="subtitle">
      你访问的页面暂时不存在，可能是链接写错了，也可能是它正在被我重构中。
      <br />
      先回到 <strong>希燃呀的数字研发试验场</strong>，继续探索代码、工具与新的想法吧。
    </p>

    <div class="actions">
      <a class="btn btn-primary" href="http://xiranya.cn/">返回主站首页</a>
      <a class="btn btn-secondary" href="javascript:history.back()">返回上一页</a>
    </div>

    <section class="cards">
      <div class="card">
        <h2>代码实验</h2>
        <p>也许你正在寻找某个项目入口，可以先回首页查看我的作品集合。</p>
      </div>

      <div class="card">
        <h2>持续构建</h2>
        <p>页面可能正在部署、迁移或重构，稍后再次访问也许就能见到它。</p>
      </div>

      <div class="card">
        <h2>希燃呀</h2>
        <p>探索底层逻辑，用代码重构世界。这里是我的数字研发试验场。</p>
      </div>
    </section>
  </main>
</body>
</html>
